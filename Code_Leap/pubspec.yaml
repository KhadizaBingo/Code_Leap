name: code_leap
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0                          # 👈 added
  flutter_secure_storage: ^9.0.0        # 👈 added

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  branding: assets/branding.png
  android: true
  ios: true
  branding_bottom_padding_ios: 35
  android_12:
    color: "#FFFFFF"
    image: assets/logo.png
    branding: assets/branding.png

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/branding.png
    - assets/python.png
    - assets/java.png
    - assets/c.png
    - assets/cpp.png